# SDK Bridge MCP 工具配置
# 通过 WebSocket 控制用户浏览器中已加载 SDK 的页面
#
# 前提: 页面需要加载 agent-runtime SDK (<script src="...">)
# SDK 会通过 WebSocket 连接到此 Server
#
# 用法 (在 agent.yaml 中):
#   tool_config:
#     - ./config/tool/tool-browser-sdk-bridge.yaml

name: agent-runtime-sdk-bridge
description: Control user's browser page via injected SDK (WebSocket bridge)
transport: stdio
tool_command: node
args:
  - dist/mcp/sdk-bridge-server.js
env:
  SDK_BRIDGE_WS_PORT: "9800"
